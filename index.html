<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="form.css">
</head>

<body>
  <div class="left-container">
    <div class="logo-container">
      <img class="logo-image" src="./images/odin-lined.png" alt="">
      <div class="logo-text">ODIN</div>
    </div>
    <p class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/">Unisplash</a></p>
  </div>
  <div class="right-container">
    <div class="right-header">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
      <p>You know you want to.</p>
    </div>
    <div class="right-main">
      <fieldset>
        <legend>Let's do this!</legend>
        <form action="example.com/path" method="post">
          <label for="first_name">First Name</label>
          <input type="text" name="first_name" id="first_name">
  
          <label for="last_name">Last Name</label>
          <input type="text" name="last_name" id="last_name">
  
          <label for="email">Email</label>
          <input type="email" name="email" id="email">
  
          <label for="phone_number">Phone Number</label>
          <input type="tel" name="phone_number" id="phone_number">
  
          <label for="password">Password</label>
          <input type="password" name="password" id="password">
  
          <label for="confirm_password">Confirm Password</label>
          <input type="password" name="confirm_password" id="confirm_password">
        </form>
      </fieldset>
    </div>
    <div class="right-footer"></div>
    <button type="submit">Create account</button>
    <p>Already have an account? Log in</p>
  </div>
</body>

</html>
