<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="form.css">
</head>

<body>
  <div class="left-container">
    <div class="logo-container">
      <img class="logo-image" src="./images/odin-lined.png" alt="">
      <div class="logo-text">ODIN</div>
    </div>
    <p class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a
        href="https://unsplash.com/">Unisplash</a></p>
  </div>
  <div class="right-container">
    <div class="right-header">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your
        deepest dreams. Sign up <span>now</span> to get started.</p>
      <p>You <span>know</span> you want to.</p>
    </div>
    <div class="right-main">
      <fieldset>
        <form action="example.com/path" method="post">
          <div class="input-column">
            <div class="input-container">
              <label for="first_name">FIRST NAME</label>
              <input type="text" name="first_name" id="first_name">
            </div>
            <div class="input-container">
              <label for="email">EMAIL</label>
              <input type="email" name="email" id="email">
            </div>
            <div class="input-container">
              <label for="password">PASSWORD</label>
              <input type="password" name="password" id="password">
            </div>
          </div>
          <div class="input-column">
            <div class="input-container">
              <label for="last_name">LAST NAME</label>
              <input type="text" name="last_name" id="last_name">
            </div>
            <div class="input-container">
              <label for="phone_number">PHONE NUMBER</label>
              <input type="tel" name="phone_number" id="phone_number">
            </div>
            <div class="input-container">
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input type="password" name="confirm_password" id="confirm_password">
            </div>
          </div>
        </form>
      </fieldset>
    </div>
    <div class="right-footer">
      <button type="submit">Create account</button>
      <p>Already have an account? Log in</p>
    </div>
  </div>
</body>

</html>
