<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="form.css">
</head>

<body>
  <div class="left-container">
    <div class="logo-container">
      <img class="logo-image" src="./images/odin-lined.png" alt="">
      <div class="logo-text">ODIN</div>
    </div>
    <p class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a
        href="https://unsplash.com/">Unisplash</a></p>
  </div>
  <div class="right-container">
    <div class="right-header">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your
        deepest dreams. Sign up <span class="emphasis">now</span> to get started.</p>
      <p>You <span class="emphasis">know</span> you want to.</p>
    </div>
    <div class="right-main">
    </div>
    <div class="right-footer">
      <button type="submit">Create Account</button>
      <p>Already have an account? <span class="login">Log in</span></p>
    </div>
  </div>
</body>

</html>
